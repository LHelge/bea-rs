name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  quality-checks:
    name: Verify Format, Lint, and Tests
    uses: ./.github/workflows/quality-checks.yml

  build:
    name: Build ${{ matrix.target }}
    needs: quality-checks
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: bea
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: bea
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: bea
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: bea.exe

    steps:
      - uses: actions/checkout@v6

      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: bea-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/${{ matrix.artifact }}

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Rename artifacts
        run: |
          mv artifacts/bea-x86_64-unknown-linux-gnu/bea artifacts/bea-linux-x86_64
          mv artifacts/bea-x86_64-apple-darwin/bea artifacts/bea-macos-x86_64
          mv artifacts/bea-aarch64-apple-darwin/bea artifacts/bea-macos-aarch64
          mv artifacts/bea-x86_64-pc-windows-msvc/bea.exe artifacts/bea-windows-x86_64.exe

      - name: Install git-cliff
        uses: taiki-e/install-action@v2
        with:
          tool: git-cliff

      - name: Generate changelog
        run: git-cliff --latest --output RELEASE_NOTES.md

      - name: Create release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            artifacts/bea-linux-x86_64
            artifacts/bea-macos-x86_64
            artifacts/bea-macos-aarch64
            artifacts/bea-windows-x86_64.exe
          body_path: RELEASE_NOTES.md
          make_latest: true

  homebrew:
    name: Update Homebrew tap
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Compute checksums from release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          mkdir dl && cd dl
          gh release download "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" \
            -p 'bea-macos-aarch64' -p 'bea-macos-x86_64' -p 'bea-linux-x86_64'
          {
            echo "VERSION=$VERSION"
            echo "SHA_MAC_ARM=$(sha256sum bea-macos-aarch64 | cut -d' ' -f1)"
            echo "SHA_MAC_X86=$(sha256sum bea-macos-x86_64 | cut -d' ' -f1)"
            echo "SHA_LINUX_X86=$(sha256sum bea-linux-x86_64 | cut -d' ' -f1)"
          } >> "$GITHUB_ENV"

      - name: Checkout tap
        uses: actions/checkout@v6
        with:
          repository: LHelge/homebrew-tap
          token: ${{ secrets.TAP_GITHUB_TOKEN }}
          path: tap

      - name: Render formula
        run: |
          mkdir -p tap/Formula
          BASE="https://github.com/${GITHUB_REPOSITORY}/releases/download/v${VERSION}"
          cat > tap/Formula/bears.rb <<EOF
          class Bears < Formula
            desc "File-based task tracker CLI and MCP server for AI agent workflows"
            homepage "https://github.com/LHelge/bea-rs"
            version "${VERSION}"
            license "MIT"

            on_macos do
              on_arm do
                url "${BASE}/bea-macos-aarch64"
                sha256 "${SHA_MAC_ARM}"
              end
              on_intel do
                url "${BASE}/bea-macos-x86_64"
                sha256 "${SHA_MAC_X86}"
              end
            end

            on_linux do
              on_intel do
                url "${BASE}/bea-linux-x86_64"
                sha256 "${SHA_LINUX_X86}"
              end
            end

            def install
              bin.install Dir["bea-*"].first => "bea"
            end

            test do
              assert_match version.to_s, shell_output("#{bin}/bea --version")
            end
          end
          EOF

      - name: Commit & push
        run: |
          cd tap
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/bears.rb
          git commit -m "bears ${VERSION}" || { echo "No changes"; exit 0; }
          git push

  publish:
    name: Publish to crates.io
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache
        uses: Swatinem/rust-cache@v2

      - name: Publish
        run: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
